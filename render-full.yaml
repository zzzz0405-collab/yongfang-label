# Render 整站部署（網頁 + API 同一網址，不用 GitHub）
# 部署後手機書籤：https://你的服務.onrender.com
services:
  - type: web
    name: yongfang-label
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      # 在 Render Dashboard 手動新增（勿寫進 GitHub）：
      # GITHUB_TOKEN = ghp_xxx（repo 權限）→ 所有人共用讀寫 label-data.json
      # 選填：GITHUB_OWNER、GITHUB_REPO、GITHUB_BRANCH、GITHUB_DATA_PATH
